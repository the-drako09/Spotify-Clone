<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
  </head>
  <body>
    <div class="container">
      <div class="leftpanel">
        <div class="left box">
          <img class="logo" src="images/logo.svg" alt="" height="43px" />
          <ul>
            <li><img class="lblogo" src="images/home.svg" alt="" />Home</li>
            <li><img class="lblogo" src="images/search.svg" alt="" />Search</li>
          </ul>
        </div>
        <div class="library box">
          <div class="playlist">
            <div class="Ylab">
              <img
                src="images/playlist.svg"
                alt=""
                class="playlist"
                height="27px"
              /><span class="txtL">Your Library</span>
            </div>
            <div class="add">+</div>
          </div>
          <div class="lib-cont">
            <div class="ltxt1">Create your first Playlist</div>
            <div class="ltxt2">It's easy,we'll help you</div>
            <button class="lc">Create playlist</button>
          </div>
          <div class="lib-cont">
             <div class="ltxt1">Let's find some podcast to follow</div>
            <div class="ltxt2">We'll keep you updated on new episodes</div>
            <button class="lc">Browse podcasts</button>
          </div>
          <div class="libend"></div>
          <div class="libend456">
          <div class="libcred">
            <button class="libcredend">Legal</button>
            <button class="libcredend">Privacy Center</button>
            <button class="libcredend">Privacy Policy</button>
            <button class="libcredend">Cookies</button>
            <button class="libcredend">About Ads</button>
            <button class="libcredend">Accessibilites</button>
          </div>
          </div>
          <button class="libcredend xtra">Cookies</button>
          <div class="region"><img src="images/region.svg" alt="" class="regn" height="26px">English</div>
        </div>
      </div>
      <div class="right box">
        <div class="rightbar">
            <div class="leftrightbuttons">
                <div>
                <button class="but1">⟨</button><button class="but1">⟩</button>
                </div>
                <div>
                <button class="signup barbut2">Sign up</button>
                <button class="login barbut2">Log in</button>
                </div>
            </div>
            <div class="topbar">
                <span class="tb1">Spotify Playlists</span>
                <button class="tb2">Show all</button>
            </div>
        </div>
        <div class="main">
            <button class="card">
                <div class="playlist1">
                <img class="cover" src="images/cover.jpg" alt="" height="190px">
                </div>
                <span class="card1a">Happy Hits</span>
                <span class="card1b">A bright mix of the happiest pop hits and feel-good anthems to lift your mood, boost your energy, and keep you smiling from morning to night.</span>
            </button>
        </div>
        <div class="cred">
            <div class="lft">
                <div class="lftbox">
                    <button class="lftbox1 end1">Company</button>
                    <button class="lftbox2 end1">About</button>
                    <button class="lftbox2 end1">Jobs</button>
                    <button class="lftbox2 end1">For the Record</button>
                </div>
                <div class="lftbox">
                     <button class="lftbox1 end1">Communities</button>
                    <button class="lftbox2 end1">For Artists</button>
                    <button class="lftbox2 end1">Developers</button>
                    <button class="lftbox2 end1">Advertising</button>
                    <button class="lftbox2 end1">Investors</button>
                    <button class="lftbox2 end1">Vendors</button>
                </div>
                <div class="lftbox">
                     <button class="lftbox1 end1">Useful links</button>
                    <button class="lftbox2 end1">Support</button>
                    <button class="lftbox2 end1">Free Mobile App</button>
                </div>
            </div>
            <div class="rgt">
                <div class="rgtlogo"><img src="images/instagram.svg" alt=""></div>
                <div class="rgtlogo"><img src="images/twitter.svg" alt=""></div>
                <div class="rgtlogo"><img src="images/facebook.svg" alt=""></div>
            </div>
        </div>
        <div class="ending"></div>
        <div class="attherate">&copy;Spotify 2023 AB</div>
      </div>
    </div>
  </body>
</html>
